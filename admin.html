<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Backspace Financial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="entry">

  <div class="bg-overlay"></div>

  <div class="card glass">
    <h1>ADMIN ACCESS</h1>
    <h2>Backspace Financial Assessment System</h2>

    <form id="adminLoginForm">
      <input type="password" id="adminPassword" placeholder="Admin Password" required>
      <button type="submit" class="primary-btn">Login</button>
    </form>

    <p id="loginError" style="color: #ef4444; text-align: center; display: none;">Invalid password</p>
  </div>

  <img src="hobys-logo.png" class="brand-logo">

  <script src="admin-auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Backspace Financial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="entry">

  <div class="bg-overlay"></div>

  <div class="card glass">
    <h1>ADMIN ACCESS</h1>
    <h2>Backspace Financial Assessment System</h2>

    <form id="adminLoginForm">
      <input type="password" id="adminPassword" placeholder="Admin Password" required>
      <button type="submit" class="primary-btn">Login</button>
    </form>

    <p id="loginError" style="color: #ef4444; text-align: center; display: none;">Invalid password</p>
  </div>

  <!-- Public site base URL for emailed links -->
  <div class="card glass" style="max-width:720px;margin:20px auto;padding:12px 18px;">
    <h3>Public site settings</h3>
    <p style="margin-top:6px;color:#374151;">Set the public base URL that will be used in emailed links so students can open them on other devices (phones, tablets).</p>
    <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
      <input id="siteBaseUrl" type="url" placeholder="https://yourdomain.com" style="flex:1;padding:8px;border-radius:6px;border:1px solid #e5e7eb;">
      <button class="copy-btn" id="saveBaseUrl">Save</button>
    </div>
    <p id="siteBaseHint" style="margin-top:8px;color:#6b7280;font-size:13px;">Current: <span id="currentBase">(not set)</span></p>
  </div>

  <img src="hobys-logo.png" class="brand-logo">

  <script src="admin-auth.js"></script>
</body>
</html>
